databases:
  - name: aband-db
    plan: free
    databaseName: aband_finance
    user: aband

services:
  - type: web
    name: aband-finance-hub
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_MODE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: aband-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
