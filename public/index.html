<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0F1D3D;--dark:#1B2A4A;--blue:#3B82F6;--green:#10B981;--red:#EF4444;--amber:#F59E0B;--purple:#8B5CF6;--teal:#06B6D4;--pink:#EC4899;--bg:#06080f;--card:#0e1525;--card2:#131b2e;--surface:#1a2338;--border:#243049;--text:#e2e8f0;--dim:#7a8ba8;--input:#0b1120}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}
input,select,textarea{font-family:'JetBrains Mono',monospace;background:var(--input);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--blue);font-size:12px;width:100%;text-align:right;transition:border .2s,box-shadow .2s;min-width:90px}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}input[type=number]{-moz-appearance:textfield;appearance:textfield}
input.tl{text-align:left}input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
select{color:var(--text);cursor:pointer;text-align:left}button{font-family:'DM Sans',sans-serif;cursor:pointer;transition:transform .12s}
.header{background:linear-gradient(135deg,var(--navy) 0%,#0c1a35 100%);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;flex-wrap:wrap;gap:10px}
.logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.year-switcher{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px}
.year-switcher button{padding:6px 10px;border:none;border-radius:7px;font-size:14px;font-weight:700;background:transparent;color:var(--dim)}
.year-switcher button:hover{background:var(--card2);color:var(--text)}
.year-switcher .active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.year-switcher .add{color:var(--green);font-size:18px;padding:4px 8px}
.user-menu{display:flex;align-items:center;gap:8px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--green));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0}
.user-dropdown{position:relative}
.user-dropdown .dd{display:none;position:absolute;right:0;top:calc(100% + 8px);background:var(--card);border:1px solid var(--border);border-radius:12px;min-width:220px;overflow:hidden;box-shadow:0 12px 32px rgba(0,0,0,.4);z-index:300}
.user-dropdown.open .dd{display:block}
.dd-head{padding:16px;border-bottom:1px solid var(--border)}
.dd-head .name{font-weight:600;font-size:14px}
.dd-head .role{font-size:11px;color:var(--dim);margin-top:2px}
.dd-item{display:block;width:100%;padding:12px 16px;border:none;background:none;color:var(--text);font-size:13px;text-align:left;cursor:pointer;font-family:'DM Sans',sans-serif}
.dd-item:hover{background:var(--surface)}
.dd-item.danger{color:var(--red)}
.tabs{display:flex;gap:3px;padding:6px 28px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;border-radius:10px;font-size:13px;border:none;background:transparent;color:var(--dim);white-space:nowrap;transition:all .2s;font-weight:500}
.tab:hover{background:var(--surface);color:var(--text)}.tab.active{background:linear-gradient(135deg,var(--surface),var(--card2));color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.content{padding:28px;max-width:1500px;margin:0 auto}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:18px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.card-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.accent{width:4px;height:22px;border-radius:2px;margin-right:10px;flex-shrink:0}
.card-title{font-weight:600;font-size:14px}.card-body{padding:18px 22px;overflow-x:auto}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:16px;margin-bottom:22px}
.kpi{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px;transition:transform .2s;position:relative;overflow:hidden}
.kpi:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.25)}
.kpi-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-weight:500}
.kpi-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:6px}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:3px}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
th{padding:12px 10px;text-align:center;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid var(--border);white-space:nowrap;background:var(--card);position:sticky;top:0;z-index:3;min-width:85px}
td{padding:10px 8px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:11px;border-bottom:1px solid rgba(36,48,73,.5);white-space:nowrap}
td.lb{text-align:left;font-family:'DM Sans',sans-serif;white-space:nowrap;font-weight:500}
tr.stripe{background:rgba(59,130,246,.03)}
.section-bar{padding:12px 18px;font-weight:700;font-size:13px;color:#fff;letter-spacing:.02em;display:flex;justify-content:space-between;align-items:center}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
.chart-wrap{position:relative;height:270px}
.btn{border:none;padding:9px 18px;border-radius:8px;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:7px}.btn:hover{transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,var(--green),#0d9488);color:#fff;box-shadow:0 3px 12px rgba(16,185,129,.25)}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;box-shadow:0 3px 12px rgba(59,130,246,.25)}
.btn-red{background:var(--red);color:#fff}.btn-amber{background:linear-gradient(135deg,var(--amber),#d97706);color:#fff}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px}.btn-xs{padding:3px 8px;font-size:10px;border-radius:5px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);padding:7px 14px;border-radius:8px;font-size:11px}.btn-ghost:hover{border-color:var(--blue);color:var(--text)}
.pill{display:inline-block;padding:4px 12px;border-radius:99px;font-size:10px;font-weight:600}
.pill-green{background:rgba(16,185,129,.12);color:var(--green)}.pill-amber{background:rgba(245,158,11,.12);color:var(--amber)}
.pill-red{background:rgba(239,68,68,.12);color:var(--red)}.pill-blue{background:rgba(59,130,246,.12);color:var(--blue)}
.pill-dim{background:rgba(122,139,168,.1);color:var(--dim)}.pill-purple{background:rgba(139,92,246,.12);color:var(--purple)}
.stab{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all .2s}
.stab.active{background:var(--surface);color:var(--text);border-color:var(--blue)}.stab:hover{border-color:var(--blue)}
.inv-preview{background:#fff;color:#1a1a2e;padding:44px;border-radius:10px;font-family:'DM Sans',sans-serif}
.inv-banner{background:#0F1D3D;color:#fff;padding:22px 32px;border-radius:10px;text-align:center;font-size:28px;font-weight:700;letter-spacing:.1em;margin-bottom:28px}
.inv-total-box{display:flex;justify-content:space-between;padding:14px 20px;background:#0F1D3D;color:#fff;border-radius:8px;font-size:18px;font-weight:700;margin-top:6px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;color:var(--dim);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.flex-row{display:flex;gap:24px;flex-wrap:wrap}.sidebar{flex:0 0 300px}.main-area{flex:1;min-width:520px}
.empty-state{text-align:center;padding:48px 24px;color:var(--dim)}.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.5}
.modal-overlay{position:fixed;inset:0;background:rgba(6,8,15,.85);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:600px;width:92%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.4)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px}
.db-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:12px}
.db-card:hover{border-color:var(--blue)}
.db-card.active-year{border-color:var(--green);background:rgba(16,185,129,.05)}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}.flex-row{flex-direction:column}.sidebar,.main-area{flex:1 1 100%;min-width:0}}
@media print{.no-print{display:none!important}body{background:#fff!important}}

  <div id="yearSwitcher" class="year-switcher"></div>

<script>
// ─── Cloud Storage + Auth ───
const api={
  async get(k){try{const r=await fetch("/api/data/"+encodeURIComponent(k));if(!r.ok){if(r.status===401)return location.href="/login.html";return null}return await r.json()}catch(e){return null}},
  async set(k,v){try{const r=await fetch("/api/data/"+encodeURIComponent(k),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({value:v})});if(r.status===401)location.href="/login.html"}catch(e){}},
  async del(k){try{await fetch("/api/data/"+encodeURIComponent(k),{method:"DELETE"})}catch(e){}}
};
async function logout(){await fetch("/api/auth/logout",{method:"POST"});location.href="/login.html"}
async function backupDownload(){try{const r=await fetch("/api/backup");const d=await r.json();const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="aband_backup_"+new Date().toISOString().split("T")[0]+".json";a.click()}catch(e){alert("Backup failed")}}

let ME=null;
async function checkAuth(){
  try{const r=await fetch("/api/auth/me");if(!r.ok){location.href="/login.html";return false}const d=await r.json();ME=d.user;
  document.getElementById("userAvatar").textContent=ME.displayName.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  document.getElementById("userName").textContent=ME.displayName;
  document.getElementById("ddName").textContent=ME.displayName;
  document.getElementById("ddRole").textContent=ME.role==="admin"?"Administrator":ME.role==="viewer"?"Viewer":"User";
  if(ME.role==="admin"){document.getElementById("ddAdmin").style.display="block";document.getElementById("ddAudit").style.display="block";document.getElementById("ddSettings").style.display="block"}
  return true}catch(e){location.href="/login.html";return false}
}

function showChangePassword(){closeDD();
document.getElementById("modalRoot").innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><h3>Change password</h3>
<div style="display:flex;flex-direction:column;gap:14px">
<div class="form-group"><div class="form-label">Current password</div><input type="password" id="cp_cur" class="tl"></div>
<div class="form-group"><div class="form-label">New password (min 6 characters)</div><input type="password" id="cp_new" class="tl"></div>
<div class="form-group"><div class="form-label">Confirm new password</div><input type="password" id="cp_conf" class="tl"></div>
<div id="cp_err" style="color:var(--red);font-size:13px;display:none"></div>
<div style="display:flex;gap:10px;justify-content:flex-end"><button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-blue" onclick="doChangePw()">Update password</button></div>
</div></div></div>`}
async function doChangePw(){
  const cur=document.getElementById("cp_cur").value,nw=document.getElementById("cp_new").value,conf=document.getElementById("cp_conf").value,err=document.getElementById("cp_err");
  if(nw!==conf){err.textContent="Passwords don't match";err.style.display="block";return}
  if(nw.length<6){err.textContent="Minimum 6 characters";err.style.display="block";return}
  const r=await fetch("/api/auth/change-password",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({currentPassword:cur,newPassword:nw})});
  const d=await r.json();if(r.ok){closeModal();alert("Password updated")}else{err.textContent=d.error;err.style.display="block"}}
function closeDD(){document.getElementById("userDD").classList.remove("open")}
document.addEventListener("click",e=>{if(!document.getElementById("userDD").contains(e.target))closeDD()});

let D,IDX,CH={},activeTab="dashboard",expV="monthly",selInvId=null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function mkClient(){return{id:uid(),name:"",address:"",city:"",contact:"",email:"",phone:"",rate:0,hstRate:.13,terms:"Net 30"}}
function mkInvoice(){return{id:uid(),month:"Jan",client:"",rate:0,hpd:8,days:0,status:"Draft",notes:"",created:new Date().toISOString().split("T")[0],sent:"",paid:""}}
function initYear(yr,copyCl){const exp={};DEF_EXP.forEach(c=>exp[c]=Array(12).fill(0));const clients=copyCl?JSON.parse(JSON.stringify(copyCl)):[{...mkClient(),name:"Client Company Name",address:"456 Client Avenue",city:"Toronto, ON M4B 2T5",contact:"John Smith",email:"ap@client.com",phone:"(416) 555-0200",rate:75}];return{company:{name:"A-Band Consulting Inc.",address:"123 Business Street",city:"Toronto, ON M5V 1A1",phone:"(416) 555-0100",email:"billing@abandconsulting.com",hst:"",year:yr},clients,invoices:[],expenseOrder:[...DEF_EXP],expenses:exp,otherRevenue:Array(12).fill(0),revExpected:Array(12).fill(null),revActual:Array(12).fill(null)}}

async function loadIndex(){const r=await api.get("aband-idx");if(r&&r.value)IDX=JSON.parse(r.value);else IDX={years:[new Date().getFullYear()],active:new Date().getFullYear()};if(!IDX.years.length){IDX.years=[new Date().getFullYear()];IDX.active=IDX.years[0]}}
async function saveIndex(){await api.set("aband-idx",JSON.stringify(IDX))}
async function loadYear(yr){const r=await api.get("aband-"+yr);if(r&&r.value){D=JSON.parse(r.value);if(!D.expenseOrder)D.expenseOrder=Object.keys(D.expenses||{});if(!D.expenses)D.expenses={};if(!D.otherRevenue)D.otherRevenue=Array(12).fill(0);if(!D.revExpected)D.revExpected=Array(12).fill(null);if(!D.revActual)D.revActual=Array(12).fill(null);if(!D.invoices)D.invoices=[];D.expenseOrder.forEach(c=>{if(!D.expenses[c])D.expenses[c]=Array(12).fill(0)});D.clients?.forEach(c=>{if(!c.id)c.id=uid()});D.invoices.forEach(iv=>{if(!iv.id)iv.id=uid();if(iv.hpd===undefined)iv.hpd=8});D.company.year=yr}else D=initYear(yr)}
async function saveYear(){await api.set("aband-"+D.company.year,JSON.stringify(D))}
async function switchYear(yr){IDX.active=yr;await saveIndex();await loadYear(yr);render();buildYS()}
async function createYear(yr,copyCl){if(IDX.years.includes(yr))return alert("Year "+yr+" exists.");IDX.years.push(yr);IDX.years.sort();IDX.active=yr;await saveIndex();const data=initYear(yr,copyCl);if(D?.company)data.company={...D.company,year:yr};D=data;await saveYear();render();buildYS();closeModal()}
async function deleteYear(yr){if(IDX.years.length<=1)return;if(!confirm("Delete ALL FY "+yr+" data?"))return;IDX.years=IDX.years.filter(y=>y!==yr);if(IDX.active===yr)IDX.active=IDX.years[IDX.years.length-1];await api.del("aband-"+yr);await saveIndex();await loadYear(IDX.active);render();buildYS()}
async function duplicateYear(from,to){if(IDX.years.includes(to))return alert("Exists.");const r=await api.get("aband-"+from);if(r&&r.value){const data=JSON.parse(r.value);data.company.year=to;data.invoices=[];data.otherRevenue=Array(12).fill(0);const exp={};(data.expenseOrder||DEF_EXP).forEach(c=>exp[c]=Array(12).fill(0));data.expenses=exp;await api.set("aband-"+to,JSON.stringify(data))}IDX.years.push(to);IDX.years.sort();await saveIndex();render();buildYS()}
async function exportAllYears(){const wb=XLSX.utils.book_new();for(const yr of IDX.years){const r=await api.get("aband-"+yr);if(r&&r.value){const d=JSON.parse(r.value),rows=[];rows.push([(d.company?.name||"")+" — FY "+yr],[],["INVOICES"],["Month","Client","Rate/hr","Hrs/Day","Days","Hours","Subtotal","HST","Total","Status"]);(d.invoices||[]).forEach(iv=>{const s=(iv.rate||0)*(iv.hpd||0)*(iv.days||0);rows.push([iv.month,iv.client,iv.rate,iv.hpd,iv.days,(iv.hpd||0)*(iv.days||0),s,r2(s*.13),r2(s+r2(s*.13)),iv.status])});rows.push([],["EXPENSES"],["Category",...MO,"Total"]);(d.expenseOrder||[]).forEach(cat=>{const v=(d.expenses||{})[cat]||Array(12).fill(0);rows.push([cat,...v,v.reduce((a,b)=>a+b,0)])});const ws=XLSX.utils.aoa_to_sheet(rows);XLSX.utils.book_append_sheet(wb,ws,"FY "+yr)}}XLSX.writeFile(wb,"ABAND_All_Years.xlsx")}

async function boot(){if(!await checkAuth())return;await loadIndex();await loadYear(IDX.active);buildTabs();buildYS();render()}
function fmt(n){return n===0?"—":new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD",minimumFractionDigits:2,maximumFractionDigits:2}).format(n)}
function fmt2(n){return new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD",minimumFractionDigits:2}).format(n)}
function pct(n){return n===0?"—":(n*100).toFixed(1)+"%"}
function r2(n){return Math.round((n+Number.EPSILON)*100)/100}
function sum(a){return r2((a||[]).reduce((s,v)=>s+(v||0),0))}
function esc(s){return(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;")}
function invSub(iv){return(iv.rate||0)*(iv.hpd||0)*(iv.days||0)}
function invHrs(iv){return(iv.hpd||0)*(iv.days||0)}
function calc(){const cats=D.expenseOrder||[],invs=D.invoices||[];const autoExp=MO.map((_,mi)=>invs.filter(iv=>iv.month===MO[mi]).reduce((s,iv)=>{const sub=r2(invSub(iv));return s+r2(sub+r2(sub*.13))},0));const autoAct=MO.map((_,mi)=>invs.filter(iv=>iv.month===MO[mi]&&iv.status==="Paid").reduce((s,iv)=>{const sub=r2(invSub(iv));return s+r2(sub+r2(sub*.13))},0));const expected=MO.map((_,i)=>D.revExpected&&D.revExpected[i]!==null&&D.revExpected[i]!==undefined?D.revExpected[i]:autoExp[i]);const actual=MO.map((_,i)=>D.revActual&&D.revActual[i]!==null&&D.revActual[i]!==undefined?D.revActual[i]:autoAct[i]);const gr=MO.map((_,i)=>actual[i]+D.otherRevenue[i]);const ex=MO.map((_,i)=>cats.reduce((s,c)=>s+(D.expenses[c]?.[i]||0),0));const np=MO.map((_,i)=>gr[i]-ex[i]);const pm=MO.map((_,i)=>gr[i]===0?0:np[i]/gr[i]);return{expected,actual,autoExp,autoAct,gr,ex,np,pm,cats}}
function cNames(){return D.clients.filter(c=>c.name).map(c=>c.name)}
function stPill(s){return`<span class="pill ${({Draft:"pill-dim",Sent:"pill-blue",Paid:"pill-green",Overdue:"pill-red",Cancelled:"pill-dim"})[s]||"pill-dim"}">${s}</span>`}
function buildTabs(){const adminTabs=ME?.role==="admin"?[{id:"users",label:"Users",icon:"🔐"},{id:"settings",label:"Settings",icon:"⚙️"},{id:"audit",label:"Audit",icon:"📋"},{id:"database",label:"Database",icon:"🗄️"}]:[{id:"database",label:"Database",icon:"🗄️"}];document.getElementById("tabBar").innerHTML=[...TABS,...adminTabs].map(t=>`<button class="tab ${t.id===activeTab?'active':''}" onclick="switchTab('${t.id}')">${t.icon} ${t.label}</button>`).join("")}
function buildYS(){document.getElementById("yearSwitcher").innerHTML=IDX.years.map(yr=>`<button class="${yr===IDX.active?'active':''}" onclick="switchYear(${yr})">${yr}</button>`).join("")+`<button class="add" onclick="showNewYearModal()">＋</button>`}
function switchTab(id){activeTab=id;closeDD();buildTabs();render()}
function render(){document.getElementById("hN").textContent=D.company.name;document.getElementById("hS").textContent="FY "+D.company.year+" · "+ME.displayName;const el=document.getElementById("appContent");el.innerHTML=`<div id="tab-${activeTab}"></div>`;({dashboard:rDash,clients:rClients,invoices:rInvoices,pnl:rPnL,expenses:rExpenses,generate:rGenerate,database:rDatabase,users:rUsers,settings:rSettings,audit:rAudit})[activeTab]?.()}
function inp(val,cb,type,cls){if(isV())return`<span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--blue);padding:4px 0;display:block;text-align:right">${val??""}</span>`;return`<input type="${type||"number"}" value="${val??""}" ${type!=="text"?'step="any"':""} class="${cls||""}" onchange="${cb}" onfocus="this.select()">`}
function isV(){return ME?.role==="viewer"}

showLockModal("rev")}
async function toggleCoLock(){if(coUnlocked){coUnlocked=false;render();return}
showLockModal("co")}

function resetRevOverrides(){if(!confirm("Reset Expected and Actual revenue to auto-calculated values from invoices? This clears any manual overrides."))return;D.revExpected=Array(12).fill(null);D.revActual=Array(12).fill(null);saveYear();closeModal();render()}

function saveClient(id){const o={name:document.getElementById("cl_name").value.trim(),contact:document.getElementById("cl_contact").value,email:document.getElementById("cl_email").value,phone:document.getElementById("cl_phone").value,address:document.getElementById("cl_addr").value,city:document.getElementById("cl_city").value,rate:parseFloat(document.getElementById("cl_rate").value)||0,hstRate:parseFloat(document.getElementById("cl_hst").value)||.13,terms:document.getElementById("cl_terms").value||"Net 30"};

`<table><thead><tr><th style="text-align:left">Client</th><th style="text-align:left">Contact</th><th style="text-align:left">Email</th><th>Phone</th><th>Rate</th><th>Invoices</th><th>Revenue</th>${!isV()?'<th>Actions</th>':""}</tr></thead><tbody>${cls.map((cl,i)=>{const clInvs=D.invoices.filter(iv=>iv.client===cl.name);const clRev=clInvs.filter(iv=>iv.status==="Paid").reduce((s,iv)=>s+invSub(iv),0);return`<tr class="${i%2?"":"stripe"}"><td class="lb" style="font-weight:600">${cl.name}</td><td class="lb">${cl.contact||"—"}</td><td class="lb" style="font-size:11px">${cl.email||"—"}</td><td style="text-align:center;font-size:11px">${cl.phone||"—"}</td><td>${cl.rate?fmt2(cl.rate)+"/hr":"—"}</td><td style="text-align:center"><span class="pill pill-blue">${clInvs.length}</span></td><td style="color:var(--green);font-weight:600">${fmt(clRev)}</td>${!isV()?`<td style="text-align:center"><div style="display:flex;gap:4px;justify-content:center"><button class="btn-ghost btn-xs" onclick="showClientModal('${cl.id}')">✏️</button><button class="btn btn-red btn-xs" onclick="delClient('${cl.id}')">✕</button></div></td>`:""}</tr>`}).join("")}</tbody></table>`}</div></div>`}

function showInvModal(invId){const isNew=!invId;const inv=isNew?mkInvoice():D.invoices.find(i=>i.id===invId);if(!inv)return;const cn=cNames();
document.getElementById("modalRoot").innerHTML=`<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px"><h3>${isNew?"New Invoice":"Edit Invoice"}</h3><button class="btn-ghost btn-sm" onclick="closeModal()">✕</button></div>

<div class="form-group" style="grid-column:1/-1"><div class="form-label">Notes</div><input type="text" id="mf_n" value="${esc(inv.notes||"")}" class="tl" placeholder="Project name, description..."></div></div>
<div style="background:var(--surface);border-radius:10px;padding:16px;margin:16px 0"><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center"><div><div class="form-label">Total Hours</div><div id="mfTH" style="font-size:18px;font-weight:700;color:var(--blue);font-family:'JetBrains Mono',monospace">0</div></div><div><div class="form-label">Subtotal</div><div id="mfSB" style="font-size:18px;font-weight:700;color:var(--green);font-family:'JetBrains Mono',monospace">$0</div></div><div><div class="form-label">Total + HST</div><div id="mfTT" style="font-size:20px;font-weight:700;color:var(--amber);font-family:'JetBrains Mono',monospace">$0</div></div></div></div>
<div style="display:flex;gap:10px;justify-content:flex-end">${!isNew?`<button class="btn btn-red btn-sm" onclick="delInv('${inv.id}')">🗑 Delete</button>`:""}<button class="btn-ghost" onclick="closeModal()">Cancel</button><button class="btn btn-blue" onclick="saveInv('${isNew?"NEW":inv.id}')">💾 ${isNew?"Create":"Save"}</button></div></div></div>`;mfCalc()}
function mfCC(){const cl=D.clients.find(c=>c.name===document.getElementById("mf_c").value);if(cl?.rate){document.getElementById("mf_r").value=cl.rate;mfCalc()}}
function mfCalc(){const r=parseFloat(document.getElementById("mf_r").value)||0,h=parseFloat(document.getElementById("mf_h").value)||0,d=parseFloat(document.getElementById("mf_d").value)||0;document.getElementById("mfTH").textContent=h*d;document.getElementById("mfSB").textContent=fmt2(r*h*d);document.getElementById("mfTT").textContent=fmt2(r2(r*h*d)+r2(r*h*d*.13))}
function saveInv(id){const o={month:document.getElementById("mf_m").value,client:document.getElementById("mf_c").value,rate:parseFloat(document.getElementById("mf_r").value)||0,hpd:parseFloat(document.getElementById("mf_h").value)||0,days:parseFloat(document.getElementById("mf_d").value)||0,status:document.getElementById("mf_s").value,notes:document.getElementById("mf_n").value};
if(!o.client)return alert("Select a client.");if(id==="NEW"){o.id=uid();o.created=new Date().toISOString().split("T")[0];o.sent="";o.paid="";if(o.status==="Paid")o.paid=o.created;if(o.status==="Sent")o.sent=o.created;D.invoices.push(o)}else{const idx=D.invoices.findIndex(i=>i.id===id);if(idx>=0){const old=D.invoices[idx];o.id=id;o.created=old.created;o.sent=old.sent||"";o.paid=old.paid||"";if(o.status==="Paid"&&!o.paid)o.paid=new Date().toISOString().split("T")[0];if(o.status==="Sent"&&!o.sent)o.sent=new Date().toISOString().split("T")[0];D.invoices[idx]=o}}saveYear();closeModal();render()}
function delInv(id){if(!confirm("Delete this invoice?"))return;D.invoices=D.invoices.filter(i=>i.id!==id);saveYear();closeModal();render()}
function dupInv(id){const o=D.invoices.find(i=>i.id===id);if(!o)return;D.invoices.push({...o,id:uid(),status:"Draft",created:new Date().toISOString().split("T")[0],sent:"",paid:"",notes:o.notes?o.notes+" (copy)":"(copy)"});saveYear();render()}
function qSt(id,st){const iv=D.invoices.find(i=>i.id===id);if(!iv)return;iv.status=st;if(st==="Paid"&&!iv.paid)iv.paid=new Date().toISOString().split("T")[0];if(st==="Sent"&&!iv.sent)iv.sent=new Date().toISOString().split("T")[0];saveYear();render()}

function parseSheet(wb,sheetName){const ws=wb.Sheets[sheetName];const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});

function genPnLXlsxB64(){const c=calc(),vr=MO.map((_,i)=>c.actual[i]-c.expected[i]),rows=[];rows.push([D.company.name+" — P&L FY "+D.company.year]);rows.push([]);rows.push(["",...MO,"ANNUAL"]);rows.push(["REVENUE"]);const ar=(l,v)=>rows.push([l,...v,sum(v)]);
ar("Expected Revenue (incl. HST)",c.expected);ar("Actual Revenue (incl. HST)",c.actual);ar("Variance",vr);ar("Other Revenue",D.otherRevenue);ar("GROSS REVENUE",c.gr);rows.push([]);rows.push(["EXPENSES"]);
c.cats.forEach(cat=>ar(cat,D.expenses[cat]||Array(12).fill(0)));ar("TOTAL EXPENSES",c.ex);rows.push([]);ar("NET PROFIT",c.np);rows.push(["Profit Margin",...c.pm,sum(c.gr)?sum(c.np)/sum(c.gr):0]);
const wb=XLSX.utils.book_new(),ws=XLSX.utils.aoa_to_sheet(rows);ws["!cols"]=[{wch:34},...MO.map(()=>({wch:14})),{wch:16}];
for(let R=0;R<rows.length;R++)for(let C=1;C<=13;C++){const a=XLSX.utils.encode_cell({r:R,c:C}),cell=ws[a];if(cell&&typeof cell.v==="number")cell.z=rows[R][0]==="Profit Margin"?"0.0%":'$#,##0.00;($#,##0.00);"—"'}
XLSX.utils.book_append_sheet(wb,ws,"P&L");return XLSX.write(wb,{type:"base64",bookType:"xlsx"})}

<div class="form-group"><div class="form-label">SMTP Host</div><input type="text" id="st_host" value="${esc(cfg.host)}" class="tl" placeholder="smtp.gmail.com"></div>
<div class="form-group"><div class="form-label">Port</div><input type="number" id="st_port" value="${cfg.port||587}" placeholder="587"></div>
<div class="form-group"><div class="form-label">Security</div><select id="st_secure" style="text-align:left"><option value="false" ${!cfg.secure?"selected":""}>STARTTLS (port 587)</option><option value="true" ${cfg.secure?"selected":""}>SSL/TLS (port 465)</option></select></div>
</div></div>

<div style="margin-bottom:24px;padding:16px;background:var(--surface);border-radius:10px">
<div style="font-size:12px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px">Authentication</div>
<div class="form-grid">
<div class="form-group"><div class="form-label">Username / Email</div><input type="text" id="st_user" value="${esc(cfg.user)}" class="tl" placeholder="your.email@gmail.com"></div>
<div class="form-group"><div class="form-label">Password / App Password</div><input type="password" id="st_pass" value="${cfg.pass?"••••••••":""}" class="tl" placeholder="App password or SMTP password"><div style="font-size:10px;color:var(--dim);margin-top:4px">For Gmail: use an App Password (Google Account → Security → App passwords)</div></div>
</div></div>

<div style="margin-bottom:24px;padding:16px;background:var(--surface);border-radius:10px">
<div style="font-size:12px;font-weight:600;color:var(--amber);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px">Sender Identity</div>
<div class="form-grid">
<div class="form-group"><div class="form-label">From Name</div><input type="text" id="st_fromName" value="${esc(cfg.fromName||D.company.name)}" class="tl" placeholder="${D.company.name}"></div>
<div class="form-group"><div class="form-label">From Email</div><input type="text" id="st_fromEmail" value="${esc(cfg.fromEmail||cfg.user)}" class="tl" placeholder="Same as username if blank"></div>
</div></div>

<div id="st_status"></div>
<div style="display:flex;gap:10px;flex-wrap:wrap">
<button class="btn btn-blue" onclick="testEmail()">🧪 Send Test Email</button>
<button class="btn btn-green" onclick="saveEmailCfg()">💾 Save Configuration</button>
${cfg.configured?'<button class="btn btn-red btn-sm" onclick="clearEmailCfg()">🗑 Remove Configuration</button>':""}
</div>
</div></div>

<div class="card"><div class="card-head"><div style="display:flex;align-items:center"><div class="accent" style="background:var(--teal)"></div><span class="card-title">Gmail Setup Guide</span></div></div><div class="card-body" style="font-size:13px;color:var(--dim);line-height:1.8">
<div style="margin-bottom:12px">To use Gmail as your outgoing mail server:</div>
<div style="padding:12px 16px;background:var(--surface);border-radius:8px;margin-bottom:8px"><span style="background:var(--blue);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:8px">1</span> Go to <span style="color:var(--text);font-weight:600">myaccount.google.com</span> → Security</div>
<div style="padding:12px 16px;background:var(--surface);border-radius:8px;margin-bottom:8px"><span style="background:var(--blue);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:8px">2</span> Enable <span style="color:var(--text);font-weight:600">2-Step Verification</span> (required for App Passwords)</div>
<div style="padding:12px 16px;background:var(--surface);border-radius:8px;margin-bottom:8px"><span style="background:var(--blue);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:8px">3</span> Search for <span style="color:var(--text);font-weight:600">App passwords</span> → Create one named "A-Band Finance Hub"</div>
<div style="padding:12px 16px;background:var(--surface);border-radius:8px;margin-bottom:8px"><span style="background:var(--blue);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:8px">4</span> Copy the 16-character password and paste it above</div>
<div style="padding:12px 16px;background:var(--surface);border-radius:8px"><span style="background:var(--green);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:8px">5</span> Set host: <span style="color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px">smtp.gmail.com</span> · Port: <span style="color:var(--text);font-weight:600">587</span> · Security: <span style="color:var(--text);font-weight:600">STARTTLS</span></div>
</div></div>`}

async function saveEmailCfg(){const cfg={host:document.getElementById("st_host").value.trim(),port:parseInt(document.getElementById("st_port").value)||587,secure:document.getElementById("st_secure").value==="true",user:document.getElementById("st_user").value.trim(),fromName:document.getElementById("st_fromName").value.trim(),fromEmail:document.getElementById("st_fromEmail").value.trim()};
const pw=document.getElementById("st_pass").value;if(pw&&pw!=="••••••••")cfg.pass=pw;
if(!cfg.host||!cfg.user){document.getElementById("st_status").innerHTML=`<div style="padding:10px 14px;background:rgba(239,68,68,.1);border-radius:8px;font-size:13px;color:var(--red);margin-bottom:12px">Host and username are required.</div>`;return}
try{const r=await fetch("/api/settings/email",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(cfg)});const d=await r.json();
if(r.ok){document.getElementById("st_status").innerHTML=`<div style="padding:10px 14px;background:rgba(16,185,129,.1);border-radius:8px;font-size:13px;color:var(--green);margin-bottom:12px;font-weight:600">✓ Configuration saved!</div>`;_emailCfg=null;setTimeout(()=>rSettings(),1000)}
else{document.getElementById("st_status").innerHTML=`<div style="padding:10px 14px;background:rgba(239,68,68,.1);border-radius:8px;font-size:13px;color:var(--red);margin-bottom:12px">${d.error||"Failed"}</div>`}}catch(e){document.getElementById("st_status").innerHTML=`<div style="padding:10px 14px;background:rgba(239,68,68,.1);border-radius:8px;font-size:13px;color:var(--red);margin-bottom:12px">Network error</div>`}}

async function testEmail(){const st=document.getElementById("st_status");st.innerHTML=`<div style="padding:10px 14px;background:rgba(59,130,246,.1);border-radius:8px;font-size:12px;color:var(--blue);margin-bottom:12px">Sending test email to ${document.getElementById("st_user").value.trim()||"..."}...</div>`;
await saveEmailCfg();
try{const r=await fetch("/api/settings/email/test",{method:"POST"});const d=await r.json();
if(r.ok&&d.success){st.innerHTML=`<div style="padding:10px 14px;background:rgba(16,185,129,.1);border-radius:8px;font-size:13px;color:var(--green);margin-bottom:12px;font-weight:600">✓ Test email sent! Check your inbox.</div>`}
else{st.innerHTML=`<div style="padding:10px 14px;background:rgba(239,68,68,.1);border-radius:8px;font-size:13px;color:var(--red);margin-bottom:12px">${d.error||"Test failed"}</div>`}}catch(e){st.innerHTML=`<div style="padding:10px 14px;background:rgba(239,68,68,.1);border-radius:8px;font-size:13px;color:var(--red);margin-bottom:12px">Error: ${e.message}</div>`}}

async function clearEmailCfg(){if(!confirm("Remove email configuration? Sending will fall back to Gmail compose links."))return;
try{await fetch("/api/settings/email",{method:"DELETE"});_emailCfg=null;rSettings()}catch(e){}}

async function rAudit(){if(ME?.role!=="admin")return;const el=document.getElementById("tab-audit");
try{const r=await fetch("/api/audit");const d=await r.json();
el.innerHTML=`<div class="card"><div class="card-head"><div style="display:flex;align-items:center"><div class="accent" style="background:var(--amber)"></div><span class="card-title">Audit Log — Last 50 events</span></div></div><div class="card-body">
<table><thead><tr><th style="text-align:left">Time</th><th style="text-align:left">User</th><th style="text-align:left">Action</th><th style="text-align:left">Detail</th><th>IP</th></tr></thead><tbody>
${(d.logs||[]).map((l,i)=>`<tr class="${i%2?"":"stripe"}"><td class="lb" style="font-size:11px;color:var(--dim)">${l.timestamp}</td><td class="lb" style="font-weight:600">${l.user||"—"}</td><td class="lb">${stPill(l.action==="LOGIN"?"Paid":l.action.includes("FAIL")?"Overdue":"Draft").replace(/>.*</,">"+l.action+"<")}</td><td class="lb" style="color:var(--dim);font-size:11px">${l.detail||""}</td><td style="font-size:11px;color:var(--dim);text-align:center">${l.ip||""}</td></tr>`).join("")}
</tbody></table></div></div>`}catch(e){}}

async function resetAll(){if(!confirm("Reset FY "+D.company.year+" data?"))return;D=initYear(D.company.year);await saveYear();render()}

boot();
</script></body></html>
