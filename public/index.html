<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>A-Band Consulting — Finance Hub</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0F1D3D;--dark:#1B2A4A;--blue:#3B82F6;--green:#10B981;--red:#EF4444;--amber:#F59E0B;--purple:#8B5CF6;--teal:#06B6D4;--pink:#EC4899;--bg:#06080f;--card:#0e1525;--card2:#131b2e;--surface:#1a2338;--border:#243049;--text:#e2e8f0;--dim:#7a8ba8;--input:#0b1120}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:9px}
input,select,textarea{font-family:'JetBrains Mono',monospace;background:var(--input);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--blue);font-size:13px;width:100%;text-align:right;transition:border .2s,box-shadow .2s}
input.tl{text-align:left}input:focus,select:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
select{color:var(--text);cursor:pointer;text-align:left}button{font-family:'DM Sans',sans-serif;cursor:pointer;transition:transform .12s}
.header{background:linear-gradient(135deg,var(--navy) 0%,#0c1a35 100%);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;flex-wrap:wrap;gap:10px}
.logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;color:#fff;flex-shrink:0;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.year-switcher{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px}
.year-switcher button{padding:6px 10px;border:none;border-radius:7px;font-size:14px;font-weight:700;background:transparent;color:var(--dim)}
.year-switcher button:hover{background:var(--card2);color:var(--text)}
.year-switcher .active{background:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.year-switcher .add{color:var(--green);font-size:18px;padding:4px 8px}
.tabs{display:flex;gap:3px;padding:6px 28px;background:var(--bg);border-bottom:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 18px;border-radius:10px;font-size:13px;border:none;background:transparent;color:var(--dim);white-space:nowrap;transition:all .2s;font-weight:500}
.tab:hover{background:var(--surface);color:var(--text)}.tab.active{background:linear-gradient(135deg,var(--surface),var(--card2));color:#fff;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.content{padding:28px;max-width:1500px;margin:0 auto}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:18px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.card-head{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.accent{width:4px;height:22px;border-radius:2px;margin-right:10px;flex-shrink:0}
.card-title{font-weight:600;font-size:14px}
.card-body{padding:18px 22px;overflow-x:auto}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:16px;margin-bottom:22px}
.kpi{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px;transition:transform .2s;position:relative;overflow:hidden}
.kpi:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.25)}
.kpi-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-weight:500}
.kpi-val{font-size:24px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.02em}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:6px}
.kpi-bar{position:absolute;top:0;left:0;right:0;height:3px}
table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
th{padding:12px 14px;text-align:center;font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid var(--border);white-space:nowrap;background:var(--card);position:sticky;top:0;z-index:3}
td{padding:10px 14px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;border-bottom:1px solid rgba(36,48,73,.5)}
td.lb{text-align:left;font-family:'DM Sans',sans-serif;white-space:nowrap;font-weight:500}
tr.stripe{background:rgba(59,130,246,.03)}
.section-bar{padding:12px 18px;font-weight:700;font-size:13px;color:#fff;letter-spacing:.02em;display:flex;justify-content:space-between;align-items:center}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
.chart-wrap{position:relative;height:270px}
.btn{border:none;padding:9px 18px;border-radius:8px;font-weight:600;font-size:12px;display:inline-flex;align-items:center;gap:7px}.btn:hover{transform:translateY(-1px)}
.btn-green{background:linear-gradient(135deg,var(--green),#0d9488);color:#fff;box-shadow:0 3px 12px rgba(16,185,129,.25)}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;box-shadow:0 3px 12px rgba(59,130,246,.25)}
.btn-red{background:var(--red);color:#fff}.btn-amber{background:linear-gradient(135deg,var(--amber),#d97706);color:#fff}
.btn-sm{padding:5px 11px;font-size:11px;border-radius:6px}.btn-xs{padding:3px 8px;font-size:10px;border-radius:5px}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--dim);padding:7px 14px;border-radius:8px;font-size:11px}.btn-ghost:hover{border-color:var(--blue);color:var(--text)}
.pill{display:inline-block;padding:4px 12px;border-radius:99px;font-size:10px;font-weight:600}
.pill-green{background:rgba(16,185,129,.12);color:var(--green)}.pill-amber{background:rgba(245,158,11,.12);color:var(--amber)}
.pill-red{background:rgba(239,68,68,.12);color:var(--red)}.pill-blue{background:rgba(59,130,246,.12);color:var(--blue)}
.pill-dim{background:rgba(122,139,168,.1);color:var(--dim)}.pill-purple{background:rgba(139,92,246,.12);color:var(--purple)}
.stab{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all .2s}
.stab.active{background:var(--surface);color:var(--text);border-color:var(--blue)}.stab:hover{border-color:var(--blue)}
.inv-preview{background:#fff;color:#1a1a2e;padding:44px;border-radius:10px;font-family:'DM Sans',sans-serif}
.inv-banner{background:#0F1D3D;color:#fff;padding:22px 32px;border-radius:10px;text-align:center;font-size:28px;font-weight:700;letter-spacing:.1em;margin-bottom:28px}
.inv-total-box{display:flex;justify-content:space-between;padding:14px 20px;background:#0F1D3D;color:#fff;border-radius:8px;font-size:18px;font-weight:700;margin-top:6px}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-size:11px;color:var(--dim);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.tab-panel{display:none}.tab-panel.active{display:block}
.flex-row{display:flex;gap:24px;flex-wrap:wrap}.sidebar{flex:0 0 300px}.main-area{flex:1;min-width:520px}
.empty-state{text-align:center;padding:48px 24px;color:var(--dim)}.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.5}
.modal-overlay{position:fixed;inset:0;background:rgba(6,8,15,.85);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:600px;width:92%;max-height:90vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.4)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:18px}
.db-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;transition:border-color .2s;flex-wrap:wrap;gap:12px}
.db-card:hover{border-color:var(--blue)}
.db-card.active-year{border-color:var(--green);background:rgba(16,185,129,.05)}
.cloud-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:600;background:rgba(16,185,129,.1);color:var(--green);border:1px solid rgba(16,185,129,.2)}
@media(max-width:900px){.charts-grid{grid-template-columns:1fr}.flex-row{flex-direction:column}.sidebar,.main-area{flex:1 1 100%;min-width:0}.form-grid{grid-template-columns:1fr 1fr}}
@media print{.no-print{display:none!important}body{background:#fff!important}}
</style>
</head><body>
<div class="header no-print">
  <div style="display:flex;align-items:center;gap:14px"><div class="logo">A</div><div><div style="font-weight:700;font-size:16px" id="hN"></div><div style="font-size:11px;color:var(--dim)"><span id="hS"></span> <span class="cloud-badge">☁️ Cloud</span></div></div></div>
  <div id="yearSwitcher" class="year-switcher"></div>
  <div style="display:flex;gap:6px"><button class="btn-ghost" onclick="switchTab('database')">🗄️ Database</button><button class="btn-ghost" onclick="backupDownload()">💾 Backup</button></div>
</div>
<div class="tabs no-print" id="tabBar"></div>
<div class="content" id="appContent"></div>
<div id="modalRoot"></div>
<script>
// ─── Cloud Storage Adapter ───
const db={
  async get(key){try{const r=await fetch("/api/data/"+encodeURIComponent(key));if(!r.ok)return null;const d=await r.json();return{value:d.value}}catch(e){return null}},
  async set(key,val){try{await fetch("/api/data/"+encodeURIComponent(key),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({value:val})})}catch(e){}},
  async del(key){try{await fetch("/api/data/"+encodeURIComponent(key),{method:"DELETE"})}catch(e){}}
};
async function backupDownload(){try{const r=await fetch("/api/backup");const d=await r.json();const blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="aband_backup_"+new Date().toISOString().split("T")[0]+".json";a.click()}catch(e){alert("Backup failed")}}

const MO=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],FMO=["January","February","March","April","May","June","July","August","September","October","November","December"],STS=["Draft","Sent","Paid","Overdue","Cancelled"],WPM=[4,4,4,5,4,4,5,4,4,5,4,5];
const DEF_EXP=["Bank charges","Interest exp (visa/loan)","Training/Professional dev.","Miscellaneous exp","Meals & entertainment","Postage and Deliveries","Office Supplies (printer/ink)","Computer exp","Business telephone","Dues/subscription (mobile)","Incorporation cost","Vehicle parking/ticket/permit","Electronics","Car lease (finance) Payment","Repairs/maintenance/Exps","Car insurance","Vehicle Gas","Office utilities","Furniture","Travel (Presto)","Rent/Mortgage","Charitable donation","Accounting Fees","Vendor","Payroll","Payroll Deduction","Government fee","Business licence/permit","Car registration","Medical Insurance","Other"];
const TABS=[{id:"dashboard",label:"Dashboard",icon:"📊"},{id:"clients",label:"Clients",icon:"👥"},{id:"invoices",label:"Invoices",icon:"🧾"},{id:"pnl",label:"P&L",icon:"📈"},{id:"expenses",label:"Expense Analysis",icon:"💰"},{id:"generate",label:"Print Invoice",icon:"🖨️"},{id:"database",label:"Database",icon:"🗄️"}];
const PC=["#EF4444","#3B82F6","#10B981","#F59E0B","#8B5CF6","#06B6D4","#EC4899","#6366f1","#f97316","#84cc16","#14b8a6","#e879f9"];
let D,IDX,CH={},activeTab="dashboard",expV="monthly",selInvId=null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function mkClient(){return{id:uid(),name:"",address:"",city:"",contact:"",email:"",phone:"",rate:0,hstRate:.13,terms:"Net 30"}}
function mkInvoice(){return{id:uid(),month:"Jan",client:"",rate:0,hpd:8,days:0,status:"Draft",notes:"",created:new Date().toISOString().split("T")[0],sent:"",paid:""}}
function initYear(yr,copyCl){const exp={};DEF_EXP.forEach(c=>exp[c]=Array(12).fill(0));const clients=copyCl?JSON.parse(JSON.stringify(copyCl)):[{...mkClient(),name:"Client Company Name",address:"456 Client Avenue",city:"Toronto, ON M4B 2T5",contact:"John Smith",email:"ap@client.com",phone:"(416) 555-0200",rate:75}];return{company:{name:"A-Band Consulting Inc.",address:"123 Business Street",city:"Toronto, ON M5V 1A1",phone:"(416) 555-0100",email:"billing@abandconsulting.com",hst:"",year:yr},clients,invoices:[],expenseOrder:[...DEF_EXP],expenses:exp,otherRevenue:Array(12).fill(0)}}

async function loadIndex(){const r=await db.get("aband-idx");if(r&&r.value)IDX=JSON.parse(r.value);else IDX={years:[new Date().getFullYear()],active:new Date().getFullYear()};if(!IDX.years.length){IDX.years=[new Date().getFullYear()];IDX.active=IDX.years[0]}}
async function saveIndex(){await db.set("aband-idx",JSON.stringify(IDX))}
async function loadYear(yr){const r=await db.get("aband-"+yr);if(r&&r.value){D=JSON.parse(r.value);if(!D.expenseOrder)D.expenseOrder=Object.keys(D.expenses||{});if(!D.expenses)D.expenses={};if(!D.otherRevenue)D.otherRevenue=Array(12).fill(0);if(!D.invoices)D.invoices=[];D.expenseOrder.forEach(c=>{if(!D.expenses[c])D.expenses[c]=Array(12).fill(0)});D.clients?.forEach(c=>{if(!c.id)c.id=uid()});D.invoices.forEach(iv=>{if(!iv.id)iv.id=uid();if(iv.hpd===undefined)iv.hpd=8});D.company.year=yr}else D=initYear(yr)}
async function saveYear(){await db.set("aband-"+D.company.year,JSON.stringify(D))}
async function switchYear(yr){IDX.active=yr;await saveIndex();await loadYear(yr);render();buildYearSwitcher()}
async function createYear(yr,copyCl){if(IDX.years.includes(yr))return alert("Year "+yr+" exists.");IDX.years.push(yr);IDX.years.sort();IDX.active=yr;await saveIndex();const data=initYear(yr,copyCl);if(D?.company){data.company={...D.company,year:yr}}D=data;await saveYear();render();buildYearSwitcher();closeModal()}
async function deleteYear(yr){if(IDX.years.length<=1)return alert("Cannot delete only year.");if(!confirm("Delete ALL FY "+yr+" data?"))return;IDX.years=IDX.years.filter(y=>y!==yr);if(IDX.active===yr)IDX.active=IDX.years[IDX.years.length-1];await db.del("aband-"+yr);await saveIndex();await loadYear(IDX.active);render();buildYearSwitcher()}
async function duplicateYear(from,to){if(IDX.years.includes(to))return alert("Year "+to+" exists.");const r=await db.get("aband-"+from);if(r&&r.value){const data=JSON.parse(r.value);data.company.year=to;data.invoices=[];data.otherRevenue=Array(12).fill(0);const exp={};(data.expenseOrder||DEF_EXP).forEach(c=>exp[c]=Array(12).fill(0));data.expenses=exp;await db.set("aband-"+to,JSON.stringify(data))}IDX.years.push(to);IDX.years.sort();await saveIndex();render();buildYearSwitcher()}
async function exportAllYears(){const wb=XLSX.utils.book_new();for(const yr of IDX.years){const r=await db.get("aband-"+yr);if(r&&r.value){const d=JSON.parse(r.value),rows=[];rows.push([(d.company?.name||"")+" — FY "+yr],[],["INVOICES"],["Month","Client","Rate/hr","Hrs/Day","Days","Hours","Subtotal","HST","Total","Status","Notes"]);(d.invoices||[]).forEach(iv=>{const s=(iv.rate||0)*(iv.hpd||0)*(iv.days||0);rows.push([iv.month,iv.client,iv.rate,iv.hpd,iv.days,(iv.hpd||0)*(iv.days||0),s,s*.13,s*1.13,iv.status,iv.notes||""])});rows.push([],["EXPENSES"],["Category",...MO,"Total"]);(d.expenseOrder||[]).forEach(cat=>{const v=(d.expenses||{})[cat]||Array(12).fill(0);rows.push([cat,...v,v.reduce((a,b)=>a+b,0)])});const ws=XLSX.utils.aoa_to_sheet(rows);XLSX.utils.book_append_sheet(wb,ws,"FY "+yr)}}XLSX.writeFile(wb,"ABAND_All_Years.xlsx")}

async function boot(){await loadIndex();await loadYear(IDX.active);buildTabs();buildYearSwitcher();render()}
function fmt(n){return n===0?"—":new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD",minimumFractionDigits:0,maximumFractionDigits:0}).format(n)}
function fmt2(n){return new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD",minimumFractionDigits:2}).format(n)}
function pct(n){return n===0?"—":(n*100).toFixed(1)+"%"}
function sum(a){return(a||[]).reduce((s,v)=>s+(v||0),0)}
function esc(s){return(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,"&quot;")}
function invSub(iv){return(iv.rate||0)*(iv.hpd||0)*(iv.days||0)}
function invHrs(iv){return(iv.hpd||0)*(iv.days||0)}
function calc(){const cats=D.expenseOrder||[],invs=D.invoices||[];const expected=MO.map((_,mi)=>invs.filter(iv=>iv.month===MO[mi]).reduce((s,iv)=>s+invSub(iv),0));const actual=MO.map((_,mi)=>invs.filter(iv=>iv.month===MO[mi]&&iv.status==="Paid").reduce((s,iv)=>s+invSub(iv),0));const gr=MO.map((_,i)=>actual[i]+D.otherRevenue[i]);const ex=MO.map((_,i)=>cats.reduce((s,c)=>s+(D.expenses[c]?.[i]||0),0));const np=MO.map((_,i)=>gr[i]-ex[i]);const pm=MO.map((_,i)=>gr[i]===0?0:np[i]/gr[i]);return{expected,actual,gr,ex,np,pm,cats}}
function cNames(){return D.clients.filter(c=>c.name).map(c=>c.name)}
function stPill(s){return`<span class="pill ${({Draft:"pill-dim",Sent:"pill-blue",Paid:"pill-green",Overdue:"pill-red",Cancelled:"pill-dim"})[s]||"pill-dim"}">${s}</span>`}
function buildTabs(){document.getElementById("tabBar").innerHTML=TABS.filter(t=>t.id!=="database").map(t=>`<button class="tab ${t.id===activeTab?'active':''}" onclick="switchTab('${t.id}')">${t.icon} ${t.label}</button>`).join("")}
function buildYearSwitcher(){document.getElementById("yearSwitcher").innerHTML=IDX.years.map(yr=>`<button class="${yr===IDX.active?'active':''}" onclick="switchYear(${yr})">${yr}</button>`).join("")+`<button class="add" onclick="showNewYearModal()" title="Add Year">＋</button>`}
function switchTab(id){activeTab=id;buildTabs();render()}
function render(){document.getElementById("hN").textContent=D.company.name;document.getElementById("hS").textContent="FY "+D.company.year;const el=document.getElementById("appContent");el.innerHTML=`<div id="tab-${activeTab}"></div>`;({dashboard:rDash,clients:rClients,invoices:rInvoices,pnl:rPnL,expenses:rExpenses,generate:rGenerate,database:rDatabase})[activeTab]?.()}
function inp(val,cb,type,cls){return`<input type="${type||"number"}" value="${val??""}" ${type!=="text"?'step="any"':""} class="${cls||""}" onchange="${cb}" onfocus="this.select()">`}
function sel(val,opts,cb,ph){return`<select onchange="${cb}"><option value="">${ph||""}</option>${opts.map(o=>`<option value="${esc(o)}" ${o==val?"selected":""}>${o}</option>`).join("")}</select>`}
function closeModal(){document.getElementById("modalRoot").innerHTML=""}
// ─── DASHBOARD ───
function rDash(){const c=calc(),el=document.getElementById("tab-dashboard"),aE=sum(c.expected),aA=sum(c.actual),aX=sum(c.ex),aP=sum(c.np),aG=sum(c.gr),invs=D.invoices||[],pend=invs.filter(i=>i.status==="Sent").reduce((s,i)=>s+invSub(i)*1.13,0);
el.innerHTML=`<div class="kpi-row"><div class="kpi"><div class="kpi-bar" style="background:var(--amber)"></div><div class="kpi-label">Expected Revenue</div><div class="kpi-val" style="color:var(--amber)">${fmt(aE)}</div><div class="kpi-sub">${invs.length} invoices</div></div><div class="kpi"><div class="kpi-bar" style="background:var(--green)"></div><div class="kpi-label">Actual Revenue</div><div class="kpi-val" style="color:var(--green)">${fmt(aA)}</div><div class="kpi-sub">${invs.filter(i=>i.status==="Paid").length} paid</div></div><div class="kpi"><div class="kpi-bar" style="background:var(--red)"></div><div class="kpi-label">Total Expenses</div><div class="kpi-val" style="color:var(--red)">${fmt(aX)}</div></div><div class="kpi"><div class="kpi-bar" style="background:var(--blue)"></div><div class="kpi-label">Net Profit</div><div class="kpi-val" style="color:${aP>=0?'var(--blue)':'var(--red)'}">${fmt(aP)}</div><div class="kpi-sub">${aG?(aP/aG*100).toFixed(1)+"% margin":"—"}</div></div><div class="kpi"><div class="kpi-bar" style="background:var(--purple)"></div><div class="kpi-label">Pending</div><div class="kpi-val" style="color:var(--purple);font-size:20px">${fmt(pend)}</div></div></div>

function saveInv(id){const o={month:document.getElementById("mf_m").value,client:document.getElementById("mf_c").value,rate:parseFloat(document.getElementById("mf_r").value)||0,hpd:parseFloat(document.getElementById("mf_h").value)||0,days:parseFloat(document.getElementById("mf_d").value)||0,status:document.getElementById("mf_s").value,notes:document.getElementById("mf_n").value};

        <div style="background:${isActive?"var(--green)":"var(--surface)"};color:${isActive?"#fff":"var(--dim)"};padding:8px 16px;border-radius:10px;font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace">${yr}</div>
        <div><div style="font-weight:600;font-size:14px">Fiscal Year ${yr} ${isActive?'<span class="pill pill-green" style="margin-left:6px">Active</span>':""}</div>
        <div style="font-size:12px;color:var(--dim);margin-top:4px">${invCount} invoices · ${clients} clients · Revenue: ${fmt(revenue)} · Expenses: ${fmt(expenses)}</div></div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${!isActive?`<button class="btn btn-blue btn-sm" onclick="switchYear(${yr})">📂 Open</button>`:""}
        <button class="btn btn-amber btn-sm" onclick="promptDuplicate(${yr})">📋 Duplicate</button>
        <button class="btn btn-green btn-sm" onclick="exportSingleYear(${yr})">📥 Export</button>
        ${IDX.years.length>1?`<button class="btn btn-red btn-sm" onclick="deleteYear(${yr})">🗑</button>`:""}
      </div>
    </div>`;
  }

  el.innerHTML=`
  <div class="card"><div class="card-head"><div style="display:flex;align-items:center"><div class="accent" style="background:var(--purple)"></div><span class="card-title">Fiscal Year Database</span></div>
    <div style="display:flex;gap:8px"><button class="btn btn-green" onclick="showNewYearModal()">＋ New Year</button><button class="btn btn-amber" onclick="exportAllYears()">📦 Export All Years</button></div>
  </div><div class="card-body">
    <div style="margin-bottom:16px;padding:14px 18px;background:var(--surface);border-radius:10px;font-size:12px;color:var(--dim);line-height:1.7">
      <strong style="color:var(--text)">🗄️ How the database works:</strong><br>
      Each fiscal year is saved as an independent record. Your invoices, clients, expenses, and revenue are stored separately per year. Switch between years using the buttons in the header. <strong>Duplicate</strong> a year to carry over clients and company info into a new year with fresh financials. <strong>Export All Years</strong> downloads every year's data into a single Excel workbook with one sheet per year.
    </div>
    ${yearCards}
  </div></div>

  <div class="card"><div class="card-head"><div style="display:flex;align-items:center"><div class="accent" style="background:var(--teal)"></div><span class="card-title">Storage Info</span></div></div><div class="card-body">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px">
      <div style="padding:16px;background:var(--surface);border-radius:10px;text-align:center"><div class="form-label">Total Years</div><div style="font-size:24px;font-weight:700;color:var(--blue);font-family:'JetBrains Mono',monospace">${IDX.years.length}</div></div>
      <div style="padding:16px;background:var(--surface);border-radius:10px;text-align:center"><div class="form-label">Active Year</div><div style="font-size:24px;font-weight:700;color:var(--green);font-family:'JetBrains Mono',monospace">${IDX.active}</div></div>
      <div style="padding:16px;background:var(--surface);border-radius:10px;text-align:center"><div class="form-label">Years Range</div><div style="font-size:24px;font-weight:700;color:var(--amber);font-family:'JetBrains Mono',monospace">${IDX.years[0]}–${IDX.years[IDX.years.length-1]}</div></div>
    </div>
  </div></div>`;
}

function promptDuplicate(fromYr){const toYr=prompt("Duplicate FY "+fromYr+" to what year?",fromYr+1);if(!toYr)return;const yr=parseInt(toYr);if(!yr||yr<2000||yr>2100)return alert("Invalid year.");duplicateYear(fromYr,yr)}

async function exportSingleYear(yr){
  try{const r=await window.storage.get("aband-"+yr);if(!r||!r.value)return alert("No data for FY "+yr);
  const d=JSON.parse(r.value),wb=XLSX.utils.book_new(),rows=[];
  rows.push([(d.company?.name||"")+" — FY "+yr]);rows.push([]);
  rows.push(["INVOICES"]);rows.push(["Month","Client","Rate/hr","Hrs/Day","Days","Total Hours","Subtotal","HST","Total","Status","Notes"]);
  (d.invoices||[]).forEach(iv=>{const s=(iv.rate||0)*(iv.hpd||0)*(iv.days||0);rows.push([iv.month,iv.client,iv.rate,iv.hpd,iv.days,(iv.hpd||0)*(iv.days||0),s,s*.13,s*1.13,iv.status,iv.notes||""])});
  rows.push([]);rows.push(["EXPENSES"]);rows.push(["Category",...MO,"Total"]);
  (d.expenseOrder||[]).forEach(cat=>{const v=(d.expenses||{})[cat]||Array(12).fill(0);rows.push([cat,...v,v.reduce((a,b)=>a+b,0)])});
  const ws=XLSX.utils.aoa_to_sheet(rows);ws["!cols"]=[{wch:28},...MO.map(()=>({wch:13})),{wch:14}];
  XLSX.utils.book_append_sheet(wb,ws,"FY "+yr);XLSX.writeFile(wb,"ABAND_FY"+yr+"_Export.xlsx")}catch(e){alert("Export failed: "+e)}
}

async function resetAll(){if(!confirm("Reset ALL data for FY "+D.company.year+"?"))return;const yr=D.company.year;D=initYear(yr);await saveYear();render()}

boot();
</script></body></html>
