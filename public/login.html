<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>A-Band Consulting — Sign In</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#06080f;overflow:hidden}
.bg{position:fixed;inset:0;z-index:0}
.bg::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(59,130,246,.08) 0%,transparent 70%);top:-200px;right:-100px}
.bg::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,.06) 0%,transparent 70%);bottom:-150px;left:-100px}

.login-card{background:#0e1525;border:1px solid #243049;border-radius:20px;padding:44px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.4);position:relative;z-index:1;text-align:center}
.login-card img{margin-bottom:20px}
.login-card h1{font-size:24px;font-weight:700;color:#fff;letter-spacing:-.02em;margin-bottom:2px}
.login-card h1 span{background:linear-gradient(135deg,#3B82F6,#8B5CF6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-card h2{font-size:15px;font-weight:500;color:#7a8ba8;margin-bottom:28px;letter-spacing:.02em}
.login-card .welcome{font-size:16px;font-weight:600;color:#e2e8f0;margin-bottom:4px}
.login-card .subtitle{font-size:13px;color:#7a8ba8;margin-bottom:24px}
.divider{width:60px;height:2px;background:linear-gradient(90deg,#3B82F6,#8B5CF6);border-radius:2px;margin:0 auto 24px}

.form-group{margin-bottom:20px;text-align:left}
.form-label{display:block;font-size:12px;font-weight:600;color:#7a8ba8;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.form-input{width:100%;background:#0b1120;border:1px solid #243049;border-radius:10px;padding:12px 16px;color:#e2e8f0;font-size:14px;font-family:'DM Sans',sans-serif;text-align:left;transition:border .2s,box-shadow .2s}
.form-input:focus{outline:none;border-color:#3B82F6;box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.form-input::placeholder{color:#4a5568}

.password-wrap{position:relative}
.password-wrap .toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#7a8ba8;cursor:pointer;font-size:16px;padding:4px}

.btn-login{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);color:#fff;font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(59,130,246,.3);letter-spacing:.01em;margin-top:8px}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(59,130,246,.4)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}

.error-msg{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#EF4444;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:8px;text-align:left}
.error-msg.show{display:flex}

.footer{margin-top:32px;text-align:center;font-size:11px;color:#4a5568}
</style>
</head>
<body>
<div class="bg"></div>

<div class="login-card">
  <img src="/logo.jpg" alt="A-Band Consulting Inc." style="width:160px;height:auto">
  <h1>A-Band Consulting Inc.</h1>
  <h2><span>Finance Hub</span></h2>
  <div class="divider"></div>
  <div class="welcome">Welcome back</div>
  <div class="subtitle">Sign in to your account</div>

  <div class="error-msg" id="errorMsg"></div>

  <form id="loginForm" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-input" type="text" id="username" placeholder="Enter your username" autocomplete="username" autofocus required>
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <div class="password-wrap">
        <input class="form-input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
        <button type="button" class="toggle" onclick="togglePw()" tabindex="-1" id="pwToggle">👁</button>
      </div>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">Sign in</button>
  </form>

  <div class="footer">
    Secured with bcrypt encryption<br>
    A-Band Consulting Inc. &copy; <span id="yr"></span>
  </div>
</div>

<script>
document.getElementById("yr").textContent = new Date().getFullYear();

function togglePw() {
  const inp = document.getElementById("password");
  const btn = document.getElementById("pwToggle");
  if (inp.type === "password") { inp.type = "text"; btn.textContent = "🙈"; }
  else { inp.type = "password"; btn.textContent = "👁"; }
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById("loginBtn");
  const err = document.getElementById("errorMsg");
  btn.disabled = true; btn.textContent = "Signing in...";
  err.classList.remove("show");

  try {
    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        username: document.getElementById("username").value.trim(),
        password: document.getElementById("password").value
      })
    });
    const data = await res.json();
    if (res.ok && data.success) {
      window.location.href = "/";
    } else {
      err.textContent = data.error || "Invalid credentials";
      err.classList.add("show");
      btn.disabled = false; btn.textContent = "Sign in";
    }
  } catch (ex) {
    err.textContent = "Connection error. Please try again.";
    err.classList.add("show");
    btn.disabled = false; btn.textContent = "Sign in";
  }
}
</script>
</body>
</html>
